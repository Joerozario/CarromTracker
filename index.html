<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --wood-dark:#5C3A21;
    --wood:#A66A3C;
    --wood-light:#C98F55;
    --felt:#F1E4C8;
    --felt-line:#3D2B1A;
    --coin-black:#221F1D;
    --queen:#A6342E;
    --queen-dark:#7C2521;
    --ink:#2B2118;
    --ink-soft:#6B5A47;
  }
  *{box-sizing:border-box;}
  html, body{ margin:0; padding:0; background:#EFE6D8; min-height:100%; }

  .carrom-app{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg, var(--wood-dark), var(--wood) 55%, var(--wood-light));
    border-radius:20px;
    padding:20px;
    width:100%;
    max-width:560px;
    margin:0 auto;
    box-shadow: inset 0 0 0 6px rgba(0,0,0,0.15), 0 20px 50px rgba(60,30,10,0.25);
  }
  @media (max-width:480px){
    .carrom-app{ border-radius:0; padding:14px; max-width:100%; box-shadow:none; }
  }

  .header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; padding:0 4px; }
  .header h1{ font-family:'Fraunces',serif; font-weight:700; font-size:26px; color:#FBF2DD; letter-spacing:-0.01em; margin:0; }
  .header p{ font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(251,242,221,0.75); margin:0; }

  .tabs{ display:flex; gap:6px; margin-bottom:14px; }
  .tab-btn{
    flex:1; font-family:'Fraunces',serif; font-weight:600; font-size:14px;
    padding:9px 0; border-radius:8px; border:1.5px solid rgba(251,242,221,0.35);
    background:rgba(0,0,0,0.12); color:rgba(251,242,221,0.75); cursor:pointer;
  }
  .tab-btn.active{ background:var(--queen); color:#FBF2DD; border-color:var(--queen); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .board-wrap{
    background:var(--felt); border-radius:14px; padding:16px;
    box-shadow: inset 0 0 0 3px var(--felt-line), inset 0 0 30px rgba(61,43,26,0.15);
  }

  .field-row{ display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  .field-row label{ font-size:11px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap; }
  .field-row input, .field-row select{
    font-family:'Inter',sans-serif; font-size:14px; padding:8px 10px;
    border-radius:8px; border:1.5px solid rgba(61,43,26,0.25); background:#fff; color:var(--ink);
    flex:1; min-width:110px;
  }
  .field-row input:focus, .field-row select:focus{ outline:2px solid var(--queen); outline-offset:1px; }

  svg.board{ display:block; width:100%; height:auto; touch-action:manipulation; cursor:pointer; }

  .path-actions{ display:flex; align-items:center; gap:10px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
  .path-count{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); }
  .path-actions .ghost-btn{ padding:6px 10px; font-size:11.5px; }
  .path-actions .ghost-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .primary-btn:disabled{ opacity:0.4; cursor:not-allowed; }

  .counter-row{ display:flex; justify-content:space-between; align-items:center; margin-top:14px; gap:10px; flex-wrap:wrap; }
  .counter-card{ background:#fff; border-radius:10px; padding:10px 16px; box-shadow: inset 0 0 0 1.5px rgba(61,43,26,0.15); text-align:center; }
  .counter-card .num{ font-family:'Fraunces',serif; font-weight:700; font-size:26px; color:var(--queen-dark); }
  .counter-card .lbl{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-soft); text-transform:uppercase; }

  .primary-btn{ font-family:'Fraunces',serif; font-weight:600; font-size:14px; padding:11px 18px; border-radius:9px; border:none; background:var(--queen); color:#FBF2DD; cursor:pointer; }
  .primary-btn:hover{ background:var(--queen-dark); }

  .ghost-btn{ font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px; padding:9px 12px; border-radius:8px; border:1.5px solid rgba(61,43,26,0.25); background:#fff; color:var(--ink); cursor:pointer; }
  .ghost-btn.danger{ color:var(--queen-dark); border-color:rgba(166,52,46,0.35); }
  .ghost-btn:hover{ background:var(--felt); }

  .report-actions{ display:flex; gap:10px; margin-top:16px; }
  .report-actions .ghost-btn{ flex:1; }

  .hint{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-soft); text-align:center; margin-top:10px; }

  .reason-group{ display:flex; gap:16px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
  .reason-group label{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink); cursor:pointer; font-family:'Inter',sans-serif; font-weight:500; }
  .reason-group input[type=radio]{ accent-color:var(--queen); width:15px; height:15px; margin:0; }

  .type-summary{ margin-top:20px; }
  .type-summary h3{ font-family:'Fraunces',serif; font-size:14px; margin:0 0 10px 0; color:var(--felt-line); }
  .bar-row{ display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .bar-row .bar-label{ font-size:11px; color:var(--ink); width:150px; flex-shrink:0; line-height:1.3; }
  .bar-track{ flex:1; height:10px; background:rgba(61,43,26,0.1); border-radius:5px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:5px; }
  .bar-row .bar-count{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); width:20px; text-align:right; }

  table.type-table{ width:100%; border-collapse:collapse; margin-top:12px; background:#fff; border-radius:8px; overflow:hidden; box-shadow: inset 0 0 0 1.5px rgba(61,43,26,0.15); }
  table.type-table th, table.type-table td{ text-align:left; padding:7px 10px; font-size:12px; }
  table.type-table th{ font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-soft); background:rgba(61,43,26,0.05); }
  table.type-table td:last-child, table.type-table th:last-child{ text-align:right; }
  table.type-table tr+tr td{ border-top:1px solid rgba(61,43,26,0.08); }

  .empty-note{ text-align:center; padding:20px 10px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace; font-size:12px; }

  .acc-buttons{ display:flex; gap:12px; }
  .acc-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
    font-family:'Fraunces',serif; font-weight:700; font-size:34px;
    padding:22px 10px; border-radius:14px; border:none; cursor:pointer;
    color:#fff; transition:transform 0.1s ease;
  }
  .acc-btn:active{ transform:scale(0.97); }
  .acc-btn span{ font-family:'Inter',sans-serif; font-weight:600; font-size:13px; }
  .acc-btn.correct{ background:#2E7D46; }
  .acc-btn.wrong{ background:var(--queen); }

  .acc-stats{ display:flex; gap:12px; margin-top:16px; }
  .acc-stats .counter-card{ flex:1; }

  .acc-percent-card{
    margin-top:16px; text-align:center; background:#fff; border-radius:12px; padding:20px;
    box-shadow: inset 0 0 0 1.5px rgba(61,43,26,0.15);
  }
  .acc-percent{ font-family:'Fraunces',serif; font-weight:700; font-size:44px; color:var(--queen-dark); }
  .acc-percent-lbl{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em; margin-top:2px; }

  .acc-alltime{ text-align:center; margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--ink-soft); }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#1C1C1E; color:#fff; padding:9px 18px; border-radius:20px;
    font-size:13px; font-family:'Inter',sans-serif; opacity:0; transition:opacity .2s, transform .2s;
    pointer-events:none; z-index:999; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,33,24,0.55);
    display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:#fff; border-radius:14px; padding:20px; max-width:320px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
  }
  .modal-box p{ font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); margin:0 0 16px 0; line-height:1.5; }
  .modal-actions{ display:flex; gap:10px; justify-content:flex-end; }
</style>

<div class="carrom-app" id="app">
  <div class="header">
    <div>
      <h1>Carrom Log</h1>
      <p>drag to log, tab to review</p>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-btn-1" onclick="switchTab(1)">Current match</button>
    <button class="tab-btn" id="tab-btn-2" onclick="switchTab(2)">Report</button>
    <button class="tab-btn" id="tab-btn-3" onclick="switchTab(3)">Accuracy</button>
  </div>

  <div class="panel active" id="panel-1">
    <div class="board-wrap">
      <div class="field-row">
        <label for="game-no">Game no</label>
        <input type="text" id="game-no" placeholder="e.g. 1" inputmode="numeric">
        <label for="mistake-type">Shot type</label>
        <select id="mistake-type">
          <option value="straight">Straight</option>
          <option value="cut_shot">Cut Shot</option>
          <option value="punch_shot">Punch Shot</option>
          <option value="push_shot">Push Shot</option>
          <option value="thumb_shot">Thumb Shot</option>
          <option value="scissor_shot">Scissor Shot</option>
          <option value="touch_shot">Touch Shot</option>
          <option value="touch_and_cut_shot">Touch &amp; Cut Shot</option>
          <option value="power_shot">Power Shot</option>
        </select>
      </div>
      <svg class="board" id="live-board" viewBox="0 0 300 300"></svg>
      <div class="hint">tap points on the board: start → bounce (if any) → end</div>
      <div class="path-actions">
        <span class="path-count" id="path-point-count">0 points</span>
        <button class="ghost-btn" id="undo-point-btn" onclick="undoPoint()" disabled>Undo point</button>
        <button class="ghost-btn" id="clear-path-btn" onclick="clearPath()" disabled>Clear</button>
      </div>
      <div class="reason-group" id="reason-group">
        <label><input type="radio" name="reason" value="angle_wrong">Angle wrong</label>
        <label><input type="radio" name="reason" value="over_speed">Over speed</label>
        <label><input type="radio" name="reason" value="low_speed">Low speed</label>
      </div>
      <div class="counter-row">
        <div class="counter-card">
          <div class="num" id="mistake-count">0</div>
          <div class="lbl">mistakes this game</div>
        </div>
        <button class="primary-btn" id="save-shot-btn" onclick="saveShot()" disabled>Save shot</button>
      </div>
      <div class="counter-row" style="margin-top:8px;">
        <button class="primary-btn" id="match-done-btn" onclick="finishMatch()" style="width:100%;">Match done</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-2">
    <div class="board-wrap">
      <svg class="board" id="report-board" viewBox="0 0 300 300"></svg>
      <div class="hint" id="report-hint">arrows = repeated mistake patterns across all games</div>

      <div class="type-summary" id="type-summary"></div>

      <div class="report-actions">
        <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(this)">
        <button class="ghost-btn" onclick="document.getElementById('import-file').click()">Import</button>
        <button class="ghost-btn" onclick="exportData()">Export</button>
        <button class="ghost-btn danger" onclick="clearAllData()">Clear all</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-3">
    <div class="board-wrap">
      <div class="acc-buttons">
        <button class="acc-btn correct" onclick="markCorrect()">✓<span>Correct shot</span></button>
        <button class="acc-btn wrong" onclick="markWrong()">✗<span>Wrong shot</span></button>
      </div>
      <button class="ghost-btn" id="undo-tap-btn" onclick="undoLastTap()" disabled style="display:block;margin:10px auto 0;">Undo last tap</button>

      <div class="acc-stats">
        <div class="counter-card">
          <div class="num" id="acc-correct" style="color:#2E7D46">0</div>
          <div class="lbl">correct</div>
        </div>
        <div class="counter-card">
          <div class="num" id="acc-wrong" style="color:var(--queen-dark)">0</div>
          <div class="lbl">wrong</div>
        </div>
        <div class="counter-card">
          <div class="num" id="acc-strikes">1</div>
          <div class="lbl">strike count</div>
        </div>
      </div>

      <div class="acc-percent-card">
        <div class="acc-percent" id="acc-percent-current">—</div>
        <div class="acc-percent-lbl">accuracy this game</div>
      </div>

      <div class="acc-alltime" id="acc-alltime">All-time: — (0 shots)</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button class="ghost-btn" id="modal-cancel">Cancel</button>
      <button class="ghost-btn danger" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'carrom-data';
  var GRID = 8;
  var PAD = 20, SIZE = 260;
  var CX = PAD + SIZE/2, CY = PAD + SIZE/2;

  var SHOT_TYPES = [
    {key:'straight', label:'Straight', color:'#A66A3C'},
    {key:'cut_shot', label:'Cut Shot', color:'#221F1D'},
    {key:'punch_shot', label:'Punch Shot', color:'#A6342E'},
    {key:'push_shot', label:'Push Shot', color:'#C98F55'},
    {key:'thumb_shot', label:'Thumb Shot', color:'#7C2521'},
    {key:'scissor_shot', label:'Scissor Shot', color:'#3D2B1A'},
    {key:'touch_shot', label:'Touch Shot', color:'#5C3A21'},
    {key:'touch_and_cut_shot', label:'Touch & Cut Shot', color:'#6B5A47'},
    {key:'power_shot', label:'Power Shot', color:'#8B4A42'}
  ];

  function reasonGroupKey(raw){ return raw === 'angle_wrong' ? 'angle_wrong' : 'speed_issue'; }
  function reasonGroupLabel(key){ return key === 'angle_wrong' ? 'Angle wrong' : 'Speed issue'; }

  var data = { current: { gameNo: '', mistakes: [], correctCount: 0, wrongCount: 0 }, history: [] };

  function toast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 1800);
  }

  function showConfirm(message){
    return new Promise(function(resolve){
      var overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-message').textContent = message;
      overlay.classList.add('show');
      function cleanup(result){
        overlay.classList.remove('show');
        cancelBtn.removeEventListener('click', onCancel);
        confirmBtn.removeEventListener('click', onConfirm);
        resolve(result);
      }
      var cancelBtn = document.getElementById('modal-cancel');
      var confirmBtn = document.getElementById('modal-confirm');
      function onCancel(){ cleanup(false); }
      function onConfirm(){ cleanup(true); }
      cancelBtn.addEventListener('click', onCancel);
      confirmBtn.addEventListener('click', onConfirm);
    });
  }

  async function load(){
    try{
      var res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        var parsed = JSON.parse(res.value);
        data.current = parsed.current || { gameNo:'', mistakes:[] };
        data.current.mistakes = data.current.mistakes || [];
        data.current.correctCount = data.current.correctCount || 0;
        data.current.wrongCount = data.current.wrongCount || 0;
        data.history = parsed.history || [];
      }
    }catch(e){ /* no data yet */ }
  }

  async function save(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(data), false);
    }catch(e){
      toast('Could not save — try again');
    }
  }

  function ns(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }

  // ---------- realistic-ish carrom board rendering ----------
  function drawBoardFrame(svg){
    svg.innerHTML = '';

    var defs = ns('defs');
    var marker = ns('marker');
    marker.setAttribute('id', 'arrowhead-' + svg.id);
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '8'); marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '6'); marker.setAttribute('markerHeight', '6');
    marker.setAttribute('orient', 'auto-start-reverse');
    var mpath = ns('path');
    mpath.setAttribute('d', 'M1 1L9 5L1 9Z');
    mpath.setAttribute('fill', 'var(--queen)');
    marker.appendChild(mpath);
    defs.appendChild(marker);
    svg.appendChild(defs);

    // outer wood-toned frame (single clean border)
    var frame = ns('rect');
    frame.setAttribute('x', PAD-10); frame.setAttribute('y', PAD-10);
    frame.setAttribute('width', SIZE+20); frame.setAttribute('height', SIZE+20);
    frame.setAttribute('rx', 8);
    frame.setAttribute('fill', 'none');
    frame.setAttribute('stroke', 'var(--wood-dark)');
    frame.setAttribute('stroke-width', '10');
    svg.appendChild(frame);

    // decorative arrow marker (muted, separate from the bright mistake-arrow marker)
    var hookMarker = ns('marker');
    hookMarker.setAttribute('id', 'hookhead-' + svg.id);
    hookMarker.setAttribute('viewBox', '0 0 10 10');
    hookMarker.setAttribute('refX', '7'); hookMarker.setAttribute('refY', '5');
    hookMarker.setAttribute('markerWidth', '5'); hookMarker.setAttribute('markerHeight', '5');
    hookMarker.setAttribute('orient', 'auto-start-reverse');
    var hookPath = ns('path');
    hookPath.setAttribute('d', 'M1 1L9 5L1 9Z');
    hookPath.setAttribute('fill', 'var(--felt-line)');
    hookMarker.appendChild(hookPath);
    svg.querySelector('defs').appendChild(hookMarker);

    var inset = 46; // how far the red circles sit in from each true corner
    var corners = [
      {x:PAD, y:PAD, sx:1, sy:1},
      {x:PAD+SIZE, y:PAD, sx:-1, sy:1},
      {x:PAD, y:PAD+SIZE, sx:1, sy:-1},
      {x:PAD+SIZE, y:PAD+SIZE, sx:-1, sy:-1}
    ];
    var redPoints = corners.map(function(c){
      return { x: c.x + c.sx*inset, y: c.y + c.sy*inset, sx:c.sx, sy:c.sy };
    });

    // inner square connecting the four red circles
    var edges = [
      [redPoints[0], redPoints[1]], // top
      [redPoints[2], redPoints[3]], // bottom
      [redPoints[0], redPoints[2]], // left
      [redPoints[1], redPoints[3]]  // right
    ];
    edges.forEach(function(e){
      var line = ns('line');
      line.setAttribute('x1', e[0].x); line.setAttribute('y1', e[0].y);
      line.setAttribute('x2', e[1].x); line.setAttribute('y2', e[1].y);
      line.setAttribute('stroke', 'var(--felt-line)');
      line.setAttribute('stroke-width', '2');
      svg.appendChild(line);
    });

    // blue pockets at the true corners
    corners.forEach(function(c){
      var pocket = ns('circle');
      pocket.setAttribute('cx', c.x); pocket.setAttribute('cy', c.y);
      pocket.setAttribute('r', 9);
      pocket.setAttribute('fill', '#3B4A8C');
      svg.appendChild(pocket);
    });

    // red circles + diagonal arrow to corner + small hook, at each corner
    redPoints.forEach(function(p){
      var g = ns('g');
      g.setAttribute('transform', 'translate(' + p.x + ',' + p.y + ') scale(' + p.sx + ',' + p.sy + ')');

      var stub = ns('line');
      stub.setAttribute('x1', 0); stub.setAttribute('y1', 0);
      stub.setAttribute('x2', -30); stub.setAttribute('y2', -30);
      stub.setAttribute('stroke', 'var(--felt-line)');
      stub.setAttribute('stroke-width', '1.5');
      stub.setAttribute('marker-end', 'url(#hookhead-' + svg.id + ')');
      g.appendChild(stub);

      var hook = ns('path');
      hook.setAttribute('d', 'M 6 20 Q 26 16 20 -4');
      hook.setAttribute('fill', 'none');
      hook.setAttribute('stroke', 'var(--felt-line)');
      hook.setAttribute('stroke-width', '1.5');
      hook.setAttribute('marker-end', 'url(#hookhead-' + svg.id + ')');
      g.appendChild(hook);

      svg.appendChild(g);

      var redDot = ns('circle');
      redDot.setAttribute('cx', p.x); redDot.setAttribute('cy', p.y);
      redDot.setAttribute('r', 8.5);
      redDot.setAttribute('fill', 'var(--queen)');
      redDot.setAttribute('stroke', 'var(--felt-line)');
      redDot.setAttribute('stroke-width', '1.5');
      svg.appendChild(redDot);
    });

    // center compass-star medallion
    var centerCircle = ns('circle');
    centerCircle.setAttribute('cx', CX); centerCircle.setAttribute('cy', CY);
    centerCircle.setAttribute('r', 30);
    centerCircle.setAttribute('fill', '#2B3A55');
    centerCircle.setAttribute('stroke', 'var(--queen)');
    centerCircle.setAttribute('stroke-width', '7');
    svg.appendChild(centerCircle);

    for(var i = 0; i < 8; i++){
      var angle = (Math.PI*2*i/8) - Math.PI/2;
      var r = (i % 2 === 0) ? 22 : 14;
      var tipX = CX + r*Math.cos(angle), tipY = CY + r*Math.sin(angle);
      var spike = ns('line');
      spike.setAttribute('x1', CX); spike.setAttribute('y1', CY);
      spike.setAttribute('x2', tipX); spike.setAttribute('y2', tipY);
      spike.setAttribute('stroke', '#F1E4C8');
      spike.setAttribute('stroke-width', '1.5');
      svg.appendChild(spike);
    }
    var centerDot = ns('circle');
    centerDot.setAttribute('cx', CX); centerDot.setAttribute('cy', CY);
    centerDot.setAttribute('r', 3);
    centerDot.setAttribute('fill', '#F1E4C8');
    svg.appendChild(centerDot);
  }

  // ---------- TAB 1: tap-to-place waypoints (immune to touch lift/fragmentation bugs) ----------
  var liveBoard = document.getElementById('live-board');
  var pathPoints = [];

  function toBoardCoords(clientX, clientY){
    var rect = liveBoard.getBoundingClientRect();
    var scaleX = 300 / rect.width, scaleY = 300 / rect.height;
    var px = (clientX - rect.left) * scaleX;
    var py = (clientY - rect.top) * scaleY;
    px = Math.max(PAD, Math.min(PAD+SIZE, px));
    py = Math.max(PAD, Math.min(PAD+SIZE, py));
    return { x: px, y: py, nx: (px-PAD)/SIZE, ny: (py-PAD)/SIZE };
  }

  function updatePathVisual(){
    drawBoardFrame(liveBoard);

    if(pathPoints.length){
      var poly = ns('polyline');
      poly.setAttribute('points', pathPoints.map(function(p){ return p.x+','+p.y; }).join(' '));
      poly.setAttribute('fill', 'none');
      poly.setAttribute('stroke', 'var(--queen)');
      poly.setAttribute('stroke-width', '3');
      poly.setAttribute('stroke-linecap', 'round');
      poly.setAttribute('stroke-linejoin', 'round');
      liveBoard.appendChild(poly);

      pathPoints.forEach(function(p, i){
        var isFirst = i === 0, isLast = i === pathPoints.length-1;
        var dot = ns('circle');
        dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
        dot.setAttribute('r', (isFirst || isLast) ? 7 : 5);
        dot.setAttribute('fill', isFirst ? '#2E7D46' : (isLast ? 'var(--queen)' : '#fff'));
        dot.setAttribute('stroke', 'var(--felt-line)');
        dot.setAttribute('stroke-width', '1.5');
        liveBoard.appendChild(dot);
      });
    }

    var count = pathPoints.length;
    document.getElementById('path-point-count').textContent = count + (count === 1 ? ' point' : ' points');
    document.getElementById('undo-point-btn').disabled = count === 0;
    document.getElementById('clear-path-btn').disabled = count === 0;
    document.getElementById('save-shot-btn').disabled = count < 2;
  }

  liveBoard.addEventListener('click', function(evt){
    var p = toBoardCoords(evt.clientX, evt.clientY);
    pathPoints.push(p);
    updatePathVisual();
  });

  window.undoPoint = function(){
    pathPoints.pop();
    updatePathVisual();
  };

  window.clearPath = function(){
    pathPoints = [];
    updatePathVisual();
  };

  window.saveShot = async function(){
    if(pathPoints.length < 2){ toast('Add at least 2 points'); return; }
    var reasonInput = document.querySelector('input[name="reason"]:checked');
    if(!reasonInput){ toast('Pick a reason before saving'); return; }

    var type = document.getElementById('mistake-type').value;
    var normPath = pathPoints.map(function(p){ return { x: p.nx, y: p.ny }; });
    data.current.mistakes.push({
      path: normPath,
      start: normPath[0],
      end: normPath[normPath.length-1],
      type: type,
      reason: reasonGroupKey(reasonInput.value)
    });
    await save();
    updateCounter();
    document.querySelectorAll('input[name="reason"]').forEach(function(r){ r.checked = false; });
    pathPoints = [];
    updatePathVisual();
    toast('Shot logged (' + normPath.length + ' points)');
  };

  function updateCounter(){
    document.getElementById('mistake-count').textContent = data.current.mistakes.length;
  }

  async function finishMatch(){
    var hasMistakes = data.current.mistakes.length > 0;
    var hasTaps = (data.current.correctCount + data.current.wrongCount) > 0;
    if(!hasMistakes && !hasTaps){
      toast('Nothing logged yet');
      return;
    }
    var gameNo = document.getElementById('game-no').value.trim() || ('Game ' + (data.history.length + 1));
    data.history.push({
      gameNo: gameNo,
      mistakes: data.current.mistakes,
      count: data.current.mistakes.length,
      correctCount: data.current.correctCount,
      wrongCount: data.current.wrongCount
    });
    var nextNo = '';
    var asNum = parseInt(gameNo, 10);
    if(!isNaN(asNum) && String(asNum) === gameNo) nextNo = String(asNum + 1);
    data.current = { gameNo: nextNo, mistakes: [], correctCount: 0, wrongCount: 0 };
    document.getElementById('game-no').value = nextNo;
    await save();
    updateCounter();
    pathPoints = [];
    updatePathVisual();
    lastTap = null;
    renderAccuracy();
    toast('Match saved to report');
    renderReport();
  }
  window.finishMatch = finishMatch;

  // ---------- TAB 3: accuracy ----------
  var lastTap = null; // 'correct' | 'wrong' | null, for undo

  function renderAccuracy(){
    var c = data.current.correctCount, w = data.current.wrongCount;
    var total = c + w;
    document.getElementById('acc-correct').textContent = c;
    document.getElementById('acc-wrong').textContent = w;
    document.getElementById('acc-strikes').textContent = 1 + w;
    document.getElementById('acc-percent-current').textContent = total === 0 ? '—' : Math.round((c/total)*100) + '%';
    document.getElementById('undo-tap-btn').disabled = !lastTap;

    var allC = c, allW = w;
    data.history.forEach(function(g){
      allC += g.correctCount || 0;
      allW += g.wrongCount || 0;
    });
    var allTotal = allC + allW;
    var allPct = allTotal === 0 ? '—' : Math.round((allC/allTotal)*100) + '%';
    document.getElementById('acc-alltime').textContent = 'All-time: ' + allPct + ' (' + allTotal + ' shot' + (allTotal===1?'':'s') + ')';
  }

  window.markCorrect = async function(){
    data.current.correctCount++;
    lastTap = 'correct';
    await save();
    renderAccuracy();
    toast('Correct shot logged');
  };
  window.markWrong = async function(){
    data.current.wrongCount++;
    lastTap = 'wrong';
    await save();
    renderAccuracy();
    toast('Wrong shot logged');
  };
  window.undoLastTap = async function(){
    if(!lastTap) return;
    if(lastTap === 'correct' && data.current.correctCount > 0) data.current.correctCount--;
    if(lastTap === 'wrong' && data.current.wrongCount > 0) data.current.wrongCount--;
    lastTap = null;
    await save();
    renderAccuracy();
    toast('Last tap undone');
  };

  // ---------- TAB 2: aggregated report ----------
  function cellIndex(n){
    var i = Math.floor(n * GRID);
    return Math.max(0, Math.min(GRID - 1, i));
  }
  function cellCenter(idx){ return (idx + 0.5) / GRID; }

  function shotLabel(key){
    var t = SHOT_TYPES.filter(function(m){ return m.key===key; })[0];
    return t ? t.label : key;
  }
  function shotColor(key){
    var t = SHOT_TYPES.filter(function(m){ return m.key===key; })[0];
    return t ? t.color : '#999';
  }

  function perpDist(A, B, P){
    var dx = B.x-A.x, dy = B.y-A.y;
    var len2 = dx*dx + dy*dy;
    if(len2 === 0) return Math.hypot(P.x-A.x, P.y-A.y);
    var t = ((P.x-A.x)*dx + (P.y-A.y)*dy) / len2;
    var projX = A.x + t*dx, projY = A.y + t*dy;
    return Math.hypot(P.x-projX, P.y-projY);
  }

  function drawGroupLabel(svg, x, y, count){
    var labelBg = ns('circle');
    labelBg.setAttribute('cx', x); labelBg.setAttribute('cy', y);
    labelBg.setAttribute('r', 9);
    labelBg.setAttribute('fill', 'var(--felt)');
    labelBg.setAttribute('stroke', 'var(--queen)');
    labelBg.setAttribute('stroke-width', '1');
    svg.appendChild(labelBg);

    var label = ns('text');
    label.setAttribute('x', x); label.setAttribute('y', y+3.5);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('font-family', 'JetBrains Mono, monospace');
    label.setAttribute('font-size', '10');
    label.setAttribute('font-weight', '600');
    label.setAttribute('fill', 'var(--queen-dark)');
    label.textContent = count;
    svg.appendChild(label);
  }

  function renderReport(){
    var svg = document.getElementById('report-board');
    drawBoardFrame(svg);

    var groups = {};
    var comboCounts = {};

    data.history.forEach(function(game){
      game.mistakes.forEach(function(m){
        var mType = m.type || 'straight';
        var mReason = m.reason || 'angle_wrong';
        var path = (m.path && m.path.length >= 2) ? m.path : [m.start, m.end];
        var start = path[0], end = path[path.length-1];

        // find the path point furthest from the straight start-end line — that's the bend/rebound point
        var maxDist = 0, peak = null;
        path.forEach(function(p){
          var d = perpDist(start, end, p);
          if(d > maxDist){ maxDist = d; peak = p; }
        });
        var isBent = maxDist > 0.06 && peak;

        var sx = cellIndex(start.x), sy = cellIndex(start.y);
        var ex = cellIndex(end.x), ey = cellIndex(end.y);
        var key, groupData;
        if(isBent){
          var px = cellIndex(peak.x), py = cellIndex(peak.y);
          key = 'B:' + sx+','+sy + '-' + px+','+py + '-' + ex+','+ey;
          groupData = { bent:true, sx:sx, sy:sy, px:px, py:py, ex:ex, ey:ey };
        } else {
          key = 'S:' + sx+','+sy + '-' + ex+','+ey;
          groupData = { bent:false, sx:sx, sy:sy, ex:ex, ey:ey };
        }
        if(!groups[key]){ groupData.count = 0; groups[key] = groupData; }
        groups[key].count++;

        var comboKey = mType + '|' + mReason;
        if(!comboCounts[comboKey]) comboCounts[comboKey] = { type:mType, reason:mReason, count:0 };
        comboCounts[comboKey].count++;
      });
    });

    var keys = Object.keys(groups);
    var reportHint = document.getElementById('report-hint');
    if(keys.length === 0){
      reportHint.textContent = 'no finished games yet — play a match and hit "Match done"';
    } else {
      reportHint.textContent = 'arrows = repeated shot patterns · bent arrows = rebounds';
      var maxCount = Math.max.apply(null, keys.map(function(k){ return groups[k].count; }));

      keys.forEach(function(k){
        var g = groups[k];
        var w = 1.5 + 3.5 * (g.count / maxCount);
        var opacity = 0.6 + 0.4*(g.count/maxCount);

        if(g.bent){
          var sxp = PAD + cellCenter(g.sx)*SIZE, syp = PAD + cellCenter(g.sy)*SIZE;
          var pxp = PAD + cellCenter(g.px)*SIZE, pyp = PAD + cellCenter(g.py)*SIZE;
          var exp = PAD + cellCenter(g.ex)*SIZE, eyp = PAD + cellCenter(g.ey)*SIZE;

          var seg1 = ns('line');
          seg1.setAttribute('x1', sxp); seg1.setAttribute('y1', syp);
          seg1.setAttribute('x2', pxp); seg1.setAttribute('y2', pyp);
          seg1.setAttribute('stroke', 'var(--queen)');
          seg1.setAttribute('stroke-width', w);
          seg1.setAttribute('stroke-linecap', 'round');
          seg1.setAttribute('opacity', opacity);
          svg.appendChild(seg1);

          var seg2 = ns('line');
          seg2.setAttribute('x1', pxp); seg2.setAttribute('y1', pyp);
          seg2.setAttribute('x2', exp); seg2.setAttribute('y2', eyp);
          seg2.setAttribute('stroke', 'var(--queen)');
          seg2.setAttribute('stroke-width', w);
          seg2.setAttribute('stroke-linecap', 'round');
          seg2.setAttribute('opacity', opacity);
          seg2.setAttribute('marker-end', 'url(#arrowhead-report-board)');
          svg.appendChild(seg2);

          drawGroupLabel(svg, pxp, pyp, g.count);
        } else {
          var x1 = PAD + cellCenter(g.sx) * SIZE;
          var y1 = PAD + cellCenter(g.sy) * SIZE;
          var x2 = PAD + cellCenter(g.ex) * SIZE;
          var y2 = PAD + cellCenter(g.ey) * SIZE;

          var line = ns('line');
          line.setAttribute('x1', x1); line.setAttribute('y1', y1);
          line.setAttribute('x2', x2); line.setAttribute('y2', y2);
          line.setAttribute('stroke', 'var(--queen)');
          line.setAttribute('stroke-width', w);
          line.setAttribute('stroke-linecap', 'round');
          line.setAttribute('opacity', opacity);
          line.setAttribute('marker-end', 'url(#arrowhead-report-board)');
          svg.appendChild(line);

          drawGroupLabel(svg, x1 + (x2-x1)*0.7, y1 + (y2-y1)*0.7, g.count);
        }
      });
    }

    renderTypeSummary(comboCounts);
  }

  function renderTypeSummary(comboCounts){
    var container = document.getElementById('type-summary');
    var entries = Object.keys(comboCounts)
      .map(function(k){
        var c = comboCounts[k];
        return {
          label: shotLabel(c.type) + ' - ' + reasonGroupLabel(c.reason),
          count: c.count,
          color: shotColor(c.type)
        };
      })
      .filter(function(e){ return e.count > 0; })
      .sort(function(a,b){ return b.count - a.count; });

    if(entries.length === 0){
      container.innerHTML = '<h3>Shot &amp; reason breakdown</h3><div class="empty-note">nothing logged yet</div>';
      return;
    }

    var maxCount = entries[0].count;
    var bars = entries.map(function(e){
      var pct = Math.round((e.count / maxCount) * 100);
      return '<div class="bar-row">' +
        '<div class="bar-label">' + e.label + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + e.color + '"></div></div>' +
        '<div class="bar-count">' + e.count + '</div>' +
      '</div>';
    }).join('');

    container.innerHTML =
      '<h3>Shot &amp; reason breakdown</h3>' +
      bars;
  }

  // ---------- tabs ----------
  window.switchTab = function(n){
    document.getElementById('panel-1').classList.toggle('active', n===1);
    document.getElementById('panel-2').classList.toggle('active', n===2);
    document.getElementById('panel-3').classList.toggle('active', n===3);
    document.getElementById('tab-btn-1').classList.toggle('active', n===1);
    document.getElementById('tab-btn-2').classList.toggle('active', n===2);
    document.getElementById('tab-btn-3').classList.toggle('active', n===3);
    if(n===2) renderReport();
    if(n===3) renderAccuracy();
  };

  // ---------- import / export / clear ----------
  window.exportData = function(){
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'carrom_log_backup.json'; a.click();
    URL.revokeObjectURL(url);
    toast('Backup exported');
  };

  window.importData = function(input){
    var file = input.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = async function(e){
      try{
        var parsed = JSON.parse(e.target.result);
        data.current = parsed.current || { gameNo:'', mistakes:[], correctCount:0, wrongCount:0 };
        data.current.mistakes = data.current.mistakes || [];
        data.current.correctCount = data.current.correctCount || 0;
        data.current.wrongCount = data.current.wrongCount || 0;
        data.history = parsed.history || [];
        await save();
        document.getElementById('game-no').value = data.current.gameNo || '';
        updateCounter();
        pathPoints = [];
        updatePathVisual();
        lastTap = null;
        renderAccuracy();
        renderReport();
        toast('Data imported');
      }catch(err){
        toast('Import failed — check the file');
      }
    };
    reader.readAsText(file);
    input.value = '';
  };

  window.clearAllData = async function(){
    var ok = await showConfirm('Delete all games and mistakes permanently? This cannot be undone.');
    if(!ok) return;
    data = { current: { gameNo:'', mistakes:[], correctCount:0, wrongCount:0 }, history: [] };
    await save();
    document.getElementById('game-no').value = '';
    updateCounter();
    pathPoints = [];
    updatePathVisual();
    lastTap = null;
    renderAccuracy();
    renderReport();
    toast('All data cleared');
  };

  // ---------- init ----------
  (async function init(){
    updatePathVisual();
    drawBoardFrame(document.getElementById('report-board'));
    await load();
    document.getElementById('game-no').value = data.current.gameNo || '';
    updateCounter();
    renderAccuracy();
  })();
})();
</script>
